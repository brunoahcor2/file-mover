spring:
  application:
    name: file-mover
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ─── File Mover Configuration ───────────────────────────────────────────────
file-mover:
  source-directory: ${FILE_MOVER_SOURCE_DIR:/tmp/file-mover/source}
  destination-directory: ${FILE_MOVER_DEST_DIR:/tmp/file-mover/destination}
  error-directory: ${FILE_MOVER_ERROR_DIR:/tmp/file-mover/error}
  poll-delay: ${FILE_MOVER_POLL_DELAY:5000}
  move-failed: ${FILE_MOVER_MOVE_FAILED:true}
  file-filter: ${FILE_MOVER_FILE_FILTER:.*\.txt}

  validation-service:
    url: ${VALIDATION_SERVICE_URL:http://localhost:8081}
    path: ${VALIDATION_SERVICE_PATH:/api/v1/validate}
    timeout-ms: ${VALIDATION_SERVICE_TIMEOUT:5000}
    connect-timeout-ms: ${VALIDATION_SERVICE_CONNECT_TIMEOUT:2000}

  # ── storage: source ────────────────────────────────────────────────────────
  source:
    type: ${STORAGE_SOURCE_TYPE:LOCAL}
    s3:
      bucket-name: ${SOURCE_S3_BUCKET:}
      region: ${SOURCE_S3_REGION:us-east-1}
      endpoint: ${SOURCE_S3_ENDPOINT:}
      access-key-id: ${SOURCE_S3_ACCESS_KEY:}
      secret-access-key: ${SOURCE_S3_SECRET_KEY:}
      key-prefix: ${SOURCE_S3_PREFIX:incoming/}
    azure:
      connection-string: ${SOURCE_AZURE_CONN_STR:}
      container-name: ${SOURCE_AZURE_CONTAINER:}
      key-prefix: ${SOURCE_AZURE_PREFIX:incoming/}
    sftp:
      host: ${SOURCE_SFTP_HOST:}
      port: ${SOURCE_SFTP_PORT:22}
      username: ${SOURCE_SFTP_USER:}
      password: ${SOURCE_SFTP_PASS:}
      remote-dir: ${SOURCE_SFTP_DIR:/upload}

  # ── storage: destination ───────────────────────────────────────────────────
  destination:
    type: ${STORAGE_DEST_TYPE:LOCAL}
    s3:
      bucket-name: ${DEST_S3_BUCKET:}
      region: ${DEST_S3_REGION:us-east-1}
      endpoint: ${DEST_S3_ENDPOINT:}
      access-key-id: ${DEST_S3_ACCESS_KEY:}
      secret-access-key: ${DEST_S3_SECRET_KEY:}
      key-prefix: ${DEST_S3_PREFIX:processed/}
    azure:
      connection-string: ${DEST_AZURE_CONN_STR:}
      container-name: ${DEST_AZURE_CONTAINER:}
      key-prefix: ${DEST_AZURE_PREFIX:processed/}
    sftp:
      host: ${DEST_SFTP_HOST:}
      port: ${DEST_SFTP_PORT:22}
      username: ${DEST_SFTP_USER:}
      password: ${DEST_SFTP_PASS:}
      remote-dir: ${DEST_SFTP_DIR:/processed}

  # ── storage: error ─────────────────────────────────────────────────────────
  error:
    type: ${STORAGE_ERROR_TYPE:LOCAL}
    s3:
      bucket-name: ${ERROR_S3_BUCKET:}
      region: ${ERROR_S3_REGION:us-east-1}
      endpoint: ${ERROR_S3_ENDPOINT:}
      access-key-id: ${ERROR_S3_ACCESS_KEY:}
      secret-access-key: ${ERROR_S3_SECRET_KEY:}
      key-prefix: ${ERROR_S3_PREFIX:error/}
    azure:
      connection-string: ${ERROR_AZURE_CONN_STR:}
      container-name: ${ERROR_AZURE_CONTAINER:}
      key-prefix: ${ERROR_AZURE_PREFIX:error/}
    sftp:
      host: ${ERROR_SFTP_HOST:}
      port: ${ERROR_SFTP_PORT:22}
      username: ${ERROR_SFTP_USER:}
      password: ${ERROR_SFTP_PASS:}
      remote-dir: ${ERROR_SFTP_DIR:/error}

# ─── Apache Camel ────────────────────────────────────────────────────────────
camel:
  springboot:
    name: FileMoverCamel
    main-run-controller: true
  metrics:
    enable-route-policy: true
    enable-message-history: true

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,camel
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# ─── Info ────────────────────────────────────────────────────────────────────
info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    description: "File mover with validation service integration"

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.filemover: DEBUG
    org.apache.camel: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/file-mover.log}